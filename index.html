<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Grade Tracker</title>
    <link rel="stylesheet" href="./styles/styles.css" />
    <script src="./script.js" defer></script>
</head>

<body>
    <!-- Header -->
    <nav>
        <h1>Student Grade Tracker</h1>
    </nav>

    <!-- Main Section -->
    <section class="form-section">
        <!-- Form Container -->
        <div class="parent-container">
            <form id="student-form">
                <div>
                    <label for="student-name">Student Name</label>
                    <input type="text" id="student-name" placeholder="Enter Student Name" />
                </div>

                <div>
                    <label for="student-grade">Student Grade</label>
                    <input type="number" id="student-grade" placeholder="Enter Student Grade" min="0" max="100" />
                </div>

                <button type="submit">Add Student</button>
            </form>
        </div>

        <!-- Students Display Section -->
        <section class="students-section">
            <h2>All Students</h2>
            <div id="students-container"></div>
        </section>

        <!-- Average Grade -->
        <p id="average-grade">Average Grade: 0</p>
    </section>
</body>

</html>
